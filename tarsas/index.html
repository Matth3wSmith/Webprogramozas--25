<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Társas</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


</head>

<body>
    <h1>Társas</h1>
    <div class="container">
        <div class="row">
            <div class="col-6">
                <h3>2. feladat</h3>
                <p>A dobások száma: <span id="f2D"></span></p>
                <p>Az ösvények száma: <span id="f2O"></span></p>
                <button type="button" class="btn btn-danger" onclick="f2()">Lekérés</button>
            </div>
            <div class="col-6">
                <h3>3. feladat</h3>
                <p>Az egyik leghosszabb a(z) <span id="sorszam"></span>. ösvény, hossza: <span id="hossz"></span></p>
                <button type="button" class="btn btn-danger" onclick="f3()">Lekérés</button>

            </div>
        </div>
        <div class="row">
            <div class="col-6">
                <h3>4. feladat</h3>
                <select id="osvenyek" onchange="f5();f6()">
                    <option value="" selected>Válassz ösvényt!</option>
                </select>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-12">
            <h3>5. feladat: Mezők mennyisége</h3>
            <ul id="osvenyStat">
            </ul>

        </div>
    </div>
    <div class="row">
        <div class="col-lg-12">
            <h3>6. feladat: Speciális mezők</h3>
            <table class="table">
                <thead>
                    <tr>
                        <th scope="col">Mező</th>
                        <th scope="col">Sorszám</th>
                    </tr>
                </thead>
                <tbody id="F6table">

                </tbody>
            </table>

        </div>
    </div>
</body>
<script>
    let filename = "dobasok.txt";
    let dobasok = [];
    let osvenyek = [];
    //1. feladat
    $.get(filename, data => {
        let adatok = data.split(" ").map(x => parseInt(x));
        dobasok = adatok;
    });
    $.get("osvenyek.txt", data => {
        let adatok = data.trim().split("\r\n");
        osvenyek = adatok;
        //console.log(osvenyek)
        f4();
    });

    function f2() {
        $("#f2D").html(dobasok.length);
        $("#f2O").html(osvenyek.length);
    }

    function f3() {
        let hosszTomb = osvenyek.map(x => x.length);
        let maxHossz = Math.max(...hosszTomb);
        let index = hosszTomb.indexOf(maxHossz);
        console.log("maxhossz ", maxHossz, " sorszam: ", index + 1);
        $("#sorszam").html(index + 1);
        $("#hossz").html(maxHossz);
        //document.querySelector("#sorszam").innerHTML=index+1;
    }
    function f4() {
        let select = document.getElementById("osvenyek");
        osvenyek.forEach((x, index) => {
            let option = document.createElement("option");
            option.innerHTML = (index + 1) + ". (" + x.length + ")";
            select.append(option);

        })

    }

    function f5() {

        let osvenyValasztas = document.getElementById("osvenyek");

        let osvenySzam = osvenyValasztas.options.selectedIndex - 1;

        let osveny = osvenyek[osvenySzam];

        console.log(osveny);

        let mezok = {};
        osveny.split("").forEach(mezo => {
            /*if(Object.keys(mezok).includes(mezo)){
                mezok[mezo]++;
            }
            else{
                mezok[mezo]=1;
            }*/

            if (mezok[mezo]) {
                mezok[mezo]++;
            }
            else {
                mezok[mezo] = 1;
            }
        })

        console.log(mezok);
        let stat = document.getElementById("osvenyStat");
        stat.innerHTML = '';
        Object.keys(mezok).forEach(mezo => {
            let li = document.createElement("li");
            li.innerHTML = "<span>" + mezo + ":</span> <span>" + mezok[mezo] + "</span> darab";
            stat.appendChild(li);
        });

    }
    function f6() {
        let osvenyValasztas = document.getElementById("osvenyek");
        let osvenySzam = osvenyValasztas.options.selectedIndex - 1;
        let osveny = osvenyek[osvenySzam];
        let mezok = {};
        osveny.split("").forEach((mezo,index) => {
            if (Object.keys(mezok).includes(mezo)) {
                mezok[mezo].push(index+1);
            }
            else {
                mezok[mezo] = [index+1];
            }
        })
        let tableB = document.getElementById("F6table");
        tableB.innerHTML="";
        console.log(mezok)

        console.log(Object.keys(mezok))
        Object.keys(mezok).forEach(mezo=>{
            if(mezo!="M"){
                mezok[mezo].forEach(x=>{
                    const tr = document.createElement("tr");
                    const tdMezo = document.createElement("td");
                    const tdSorszam = document.createElement("td");
                    tdMezo.innerHTML=mezo;
                    tdSorszam.innerHTML=x;
                    tr.appendChild(tdMezo);
                    tr.appendChild(tdSorszam);
                    tableB.appendChild(tr);

                })
            }
        })
    }


</script>

</html>
