<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="">횒rj meg egy magyar nevet:</label>
    <input type="text" id="magyarNev">
    <button onclick="angol()">Angol helyes챠r찼s</button>
    <p id="angolNev"></p>
</body>
<script>
    magyarNev.addEventListener("keyup", function(){
        let nev = magyarNev.value;
        let pattern = /^([A-Z키횁횋횣흶횙횥횜횒]+|([A-Z키횁횋횣흶횙횥횜횒]+-[A-Z키횁횋횣흶횙횥횜횒]+)) (([A-Z횋횁키횣흶횙횥횜횒]{2,})|([A-Z횋횁키횣흶횙횥횜횒]{2,} [A-Z횋횁키횣흶횙횥횜횒]{2,}))$/i;
        if(pattern.test(nev)){
            magyarNev.style.backgroundColor = "white";
            magyarNev.style.color = "darkgreen";
        } else {
            magyarNev.style.backgroundColor = "red";
            magyarNev.style.color = "white";
        }
    })

    function angol(){
        let splitelt = magyarNev.value.split(" ").reverse();
        for(let i = 0; i < splitelt.length; i++){
            splitelt[i] = csere(splitelt[i]);
        }
        angolNev.innerHTML = splitelt.join(" ");
    }
    function csere(szoveg){
        let szoveg2 = szoveg.replace(/횁/g, "A").replace(/횋/g, "E").replace(/횒/g, "I").replace(/횥/g, "U").replace(/키/g, "U").replace(/횣/g, "U").replace(/흶/g, "O").replace(/횙/g, "O").replace(/횜/g,"O");
        szoveg2=szoveg2.replace(/찼/g, "a").replace(/챕/g, "e").replace(/챠/g, "i").replace(/체/g, "u").replace(/킥/g, "u").replace(/첬/g, "u").replace(/흷/g, "o").replace(/처/g, "o").replace(/철/g,"o");
        return szoveg2;
    }
</script>
</html>
