<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiszaburai osztályai</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>
    <div class="container p-4">

        <div class="row mb-3">
            <div class="col-12">
                <div class="p-3 border rounded bg-light text-center fw-bold">
                    Felső sáv (Fejléc)
                </div>
            </div>
        </div>

        <div class="row">

            <div class="col-md-4 d-flex mb-3 mb-md-0">
                <div
                    class="p-4 border rounded bg-light w-100 text-center d-flex align-items-center justify-content-center">
                    Bal nagy doboz <br> (Megnövelt magasság)
                </div>
            </div>

            <div class="col-md-8 d-flex flex-column">

                <div class="row flex-grow-1 mb-3">

                    <div class="col-md-6 d-flex mb-3 mb-md-0">
                        <div
                            class="p-4 border rounded bg-light w-100 text-center d-flex align-items-center justify-content-center">
                            Belső összevont doboz <br> (Felső és Alsó egyesítve)
                        </div>
                    </div>

                    <div class="col-md-6 d-flex">
                        <div
                            class="p-4 border rounded bg-light w-100 text-center d-flex align-items-center justify-content-center">
                            Jobb oldali magas doboz
                        </div>
                    </div>

                </div>

                <div class="row">
                    <div class="col-12">
                        <div class="p-3 border rounded bg-light text-center">
                            Egyetlen cella a táblázat végéig
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>
</body>

</html>
