<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        table, td{
            border: solid 1px black;
            border-collapse: collapse;
            padding: 5px;
        }
    </style>
</head>
<body>
    <h1>Tiszabura</h1>
    <div class="feladatok">
        <div class="feladat">
            <p>A leggyakoribb családnév: <span id="f1"></span></p>
            <p>A leggyakoribb első útónév: <span id="f2"></span></p>
            <p>A leggyakoribb második útónév: <span id="f3"></span></p>
            <p>A leggyakoribb utónév: <span id="f4"></span></p>
        </div>
        <table >
            <thead>
                <th>Családnév</th>
                <button onclick="nevSzerintNov()" > Rendezés növekvőbe</button>
                <button onclick="nevSzerintCsok()" > Rendezés csökkenőbe </button>
                <th>Mennyiség</th>
                <button onclick="mennyisegSzerintNov()" > Rendezés növekvőbe</button>
                <button onclick="mennyisegSzerintCsok()" > Rendezés csökkenőbe</button>
            </thead>
            <tbody id="f5">
                
            </tbody>
        </table>
    </div>

</body>
<script>

   
    function nevSzerintCsok(){
        // 1. Kinyerjük a kulcsokat egy tömbbe
        // 2. Sorba rendezzük őket (ABC)
        // 3. Egy reduce segítségével felépítünk egy új objektumot
        dictCs = Object.keys(dictCs).sort().reverse().reduce((acc, key) => {
            acc[key] = dictCs[key];
            return acc;
        }, {});
        tableCreate();
    }
    function mennyisegSzerintCsok(){
        // 1. Az objektumból [kulcs, érték] párokból álló tömböt készítünk
        // 2. Sorba rendezzük a tömböt a második elem (az érték) alapján
        // 3. Az Object.fromEntries segítségével visszalakítjuk objektummá
        dictCs =  Object.fromEntries(
            Object.entries(dictCs).sort(([, a], [, b]) => b - a)
        );
        console.log(dictCs)
        tableCreate();
    } 
    function nevSzerintNov(){
        // 1. Kinyerjük a kulcsokat egy tömbbe
        // 2. Sorba rendezzük őket (ABC)
        // 3. Egy reduce segítségével felépítünk egy új objektumot
        dictCs = Object.keys(dictCs).sort().reduce((acc, key) => {
            acc[key] = dictCs[key];
            return acc;
        }, {});
        tableCreate();
    }
    function mennyisegSzerintNov(){
        // 1. Az objektumból [kulcs, érték] párokból álló tömböt készítünk
        // 2. Sorba rendezzük a tömböt a második elem (az érték) alapján
        // 3. Az Object.fromEntries segítségével visszalakítjuk objektummá
        dictCs =  Object.fromEntries(
            Object.entries(dictCs).sort(([, a], [, b]) => a - b)
        );
        console.log(dictCs)
        tableCreate();
    }
    function tableCreate(){
        console.log("Létrehoz")
        $("#f5").html("");
        Object.keys(dictCs).forEach(nev => {
            let sor = $("<tr></tr>");
            let nevTd = $("<td></td>");
            let mennyisegTd = $("<td></td>");
            mennyisegTd.html(dictCs[nev])
            nevTd.html(nev);
            sor.append(nevTd);
            sor.append(mennyisegTd);
            $("#f5").append(sor);

        })
    }
        
    let dictCs = {};
    let dictU1 = {};
    let dictU2 = {};
    let dictU = {};
    let file = "nevek.txt"
     $.get(file, function(data){
        let nevek = data.split("\r\n").map(x=>x.split("\t"));
        

        //feladat 1
        nevek.forEach((diak,i) => {
            diak[1]=diak[1].split(" ");
            if(!Object.keys(dictCs).includes(diak[1][0])){
                dictCs[diak[1][0]] = 1;
            }
            else{
                dictCs[diak[1][0]] += 1;

            }
            if(!Object.keys(dictU1).includes(diak[1][1])){
                dictU1[diak[1][1]] = 1;
            }
            else{
                dictU1[diak[1][1]] += 1;

            }
            if(diak[1][2]!=undefined && !Object.keys(dictU2).includes(diak[1][2])){
                dictU2[diak[1][2]] = 1;
            }
            else if (diak[1][2]!=undefined){
                dictU2[diak[1][2]] += 1;

            }
        });
        $("#f1").html(Object.keys(dictCs)[Object.values(dictCs).indexOf(Math.max(...Object.values(dictCs)))]);

        //feladat 2
        //leggyakoribb első utónév
        $("#f2").html(Object.keys(dictU1)[Object.values(dictU1).indexOf(Math.max(...Object.values(dictU1)))]);

        //feladat 3
        //leggyakoribb második utónév
        $("#f3").html(Object.keys(dictU2)[Object.values(dictU2).indexOf(Math.max(...Object.values(dictU2)))]);

        //feladat 4
        //leggyakoribb utónév
        let utonevek = [...new Set([...Object.keys(dictU1), ...Object.keys(dictU2)])];
        utonevek.forEach(nev =>{
            if(!Object.keys(dictU).includes(nev)){
                dictU[nev] = 0;
                dictU[nev] += dictU1[nev]!=undefined ? dictU1[nev] : 0;
                dictU[nev] += dictU2[nev]!=undefined ? dictU2[nev] : 0;
            }
            else{
                dictU[nev] += dictU1[nev]!=undefined ? dictU1[nev] : 0;
                dictU[nev] += dictU2[nev]!=undefined ? dictU2[nev] : 0;
            }
        })
        console.log(dictU)
        $("#f4").html(Object.keys(dictU)[Object.values(dictU).indexOf(Math.max(...Object.values(dictU)))]);

        //feladat 5
        //családnevek listája, darabszámmal együtt, táblázatszerűen, 
        //rendezhetően ABC/darabszám szerint, növekvő/csökkenő sorrendben
        tableCreate();
        
     })

</script>
</html>
